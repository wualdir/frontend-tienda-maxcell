<section class="form-container">
  <header class="form-header">
    <h2 class="form-title">➕ Registrar Nuevo Dispositivo</h2>
    <p class="form-subtitle">Completa la ficha técnica para el catálogo.</p>
  </header>

  <form (ngSubmit)="guardar()" class="dark-form">
    <div class="form-grid">
      
      <div class="form-section">
        <h3 class="section-title">📦 Información General</h3>
        
        <div class="input-group">
          <label>Modelo del Dispositivo</label>
          <input type="text" [(ngModel)]="producto.modelo" name="modelo" placeholder="Ej: iPhone 15 Pro" required>
        </div>

        <div class="input-row">
          <div class="input-group">
            <label>Marca</label>
            <input type="text" [(ngModel)]="producto.marca" name="marca" placeholder="Apple">
          </div>
          <div class="input-group">
            <label>Stock Inicial</label>
            <input type="number" [(ngModel)]="producto.stock" name="stock">
          </div>
        </div>

        <div class="input-row">
          <div class="input-group">
            <label>Precio Venta (S/)</label>
            <input type="number" [(ngModel)]="producto.precio" name="precio" class="highlight">
          </div>
          <div class="input-group">
            <label>Precio Original</label>
            <input type="number" [(ngModel)]="producto.precioOriginal" name="precioOriginal">
          </div>
        </div>

        <div class="input-group">
          <label>Descripción Corta</label>
          <textarea [(ngModel)]="producto.descripcion" name="descripcion" rows="3"></textarea>
        </div>
      </div>

      <div class="form-section">
        <h3 class="section-title">🛠️ Especificaciones & Media</h3>
        
        <div class="image-upload" (click)="fileInput.click()">
          <input type="file" #fileInput (change)="onFile($event)" hidden>
          <div *ngIf="!imagePreview" class="upload-placeholder">
            <span class="icon">📸</span>
            <p>Click para subir imagen</p>
          </div>
          <img *ngIf="imagePreview" [src]="imagePreview" class="preview-img">
        </div>

        <div class="specs-grid">
          <div class="input-group">
            <label>Pantalla</label>
            <input type="text" [(ngModel)]="producto.specs.espePantalla" name="pantalla" placeholder="6.1' OLED">
          </div>
          <div class="input-group">
            <label>RAM</label>
            <input type="text" [(ngModel)]="producto.specs.espeRam" name="ram" placeholder="8GB">
          </div>
          <div class="input-group">
            <label>Almacenamiento</label>
            <input type="text" [(ngModel)]="producto.specs.espeAlmacenamiento" name="almacen" placeholder="128GB">
          </div>
          <div class="input-group">
            <label>Batería</label>
            <input type="text" [(ngModel)]="producto.specs.espeBateria" name="bateria" placeholder="4000 mAh">
          </div>
        </div>
      </div>

    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" routerLink="/admin/productos">Cancelar</button>
      <button type="submit" class="btn-save" [disabled]="loading">
        {{ loading ? 'Guardando...' : '🚀 Publicar Producto' }}
      </button>
    </div>
  </form>
</section>
