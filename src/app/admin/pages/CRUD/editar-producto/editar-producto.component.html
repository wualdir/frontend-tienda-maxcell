<section class="form-container">
  <header class="form-header">
    <h2 class="form-title">✏️ Editar Dispositivo</h2>
    <p class="form-subtitle">Modificando: <span class="accent">{{ producto.modelo }}</span></p>
  </header>

  <form (ngSubmit)="actualizar()" class="dark-form">
    <div class="form-grid">
      
      <div class="form-section">
        <h3 class="section-title">📦 Datos del Producto</h3>
        
        <div class="input-group">
          <label>Modelo</label>
          <input type="text" [(ngModel)]="producto.modelo" name="modelo" required>
        </div>

        <div class="input-row">
          <div class="input-group">
            <label>Marca</label>
            <input type="text" [(ngModel)]="producto.marca" name="marca">
          </div>
          <div class="input-group">
            <label>Stock</label>
            <input type="number" [(ngModel)]="producto.stock" name="stock">
          </div>
        </div>

        <div class="input-row">
          <div class="input-group">
            <label>Precio Oferta (S/)</label>
            <input type="number" [(ngModel)]="producto.precio" name="precio" class="highlight-warn">
          </div>
          <div class="input-group">
            <label>Precio Lista</label>
            <input type="number" [(ngModel)]="producto.precioOriginal" name="precioOriginal">
          </div>
        </div>

        <div class="input-group">
          <label>Descripción</label>
          <textarea [(ngModel)]="producto.descripcion" name="descripcion" rows="4"></textarea>
        </div>
      </div>

      <div class="form-section">
        <h3 class="section-title">🛠️ Multimedia & Ficha Técnica</h3>
        
        <div class="multimedia-container">
          <!-- Botón de carga -->
          <div class="upload-zone-v2" (click)="fileInput.click()">
            <input type="file" #fileInput (change)="onFilesSelected($event)" multiple accept="image/*" hidden>
            <div class="upload-content">
              <span class="icon">📸</span>
              <span>Añadir Fotos</span>
            </div>
          </div>

          <!-- Galería unificada de miniaturas -->
          <div class="mini-gallery-grid">
            <!-- Fotos actuales en BD -->
            <div *ngFor="let url of imagenesActuales; let i = index" class="mini-card current">
              <img [src]="url">
              <button type="button" class="btn-x" (click)="removeExistingImage(i)">×</button>
              <span class="badge">Actual</span>
            </div>

            <!-- Fotos nuevas por subir -->
            <div *ngFor="let pre of imagePreviews; let i = index" class="mini-card new">
              <img [src]="pre">
              <button type="button" class="btn-x" (click)="removeNewImage(i)">×</button>
              <span class="badge">Nueva</span>
            </div>
          </div>
        </div>

        <div class="specs-grid">
          <div class="input-group">
            <label>Cámara Principal</label>
            <input type="text" [(ngModel)]="producto.specs.espeCamPrincipal" name="cam">
          </div>
          <div class="input-group">
            <label>Pantalla</label>
            <input type="text" [(ngModel)]="producto.specs.espePantalla" name="pan">
          </div>
          <div class="input-group">
            <label>Batería</label>
            <input type="text" [(ngModel)]="producto.specs.espeBateria" name="bat">
          </div>
          <div class="input-group">
            <label>Memoria RAM</label>
            <input type="text" [(ngModel)]="producto.specs.espeRam" name="ram">
          </div>
          <div class="input-group full-width">
            <label>Almacenamiento</label>
            <input type="text" [(ngModel)]="producto.specs.espeAlmacenamiento" name="almacen">
          </div>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" routerLink="/admin/productos">Volver</button>
      <button type="submit" class="btn-save update" [disabled]="loading">
        {{ loading ? 'Actualizando...' : '💾 Guardar Cambios' }}
      </button>
    </div>
  </form>
</section>
