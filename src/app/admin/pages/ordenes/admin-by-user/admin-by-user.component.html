<button routerLink="/admin/ordenes">⬅ Volver</button>

<h2>👤 Cliente: {{ user?.username }}</h2>

<div *ngFor="let o of ordenes" style="border:1px solid #ccc; margin:10px; padding:10px;">

  <p>🧾 Pedido: {{ o.id }}</p>
  <p>💰 Total: {{ o.total }}</p>
  <p>📌 Estado: {{ o.estado }}</p>

  <!-- 👇 SOLO LINK AL DETALLE -->
  <a [routerLink]="['/admin/ordenes/detalle', o.id]">
    Ver detalle
  </a>

</div>
