<div class="cart-overlay" [class.active]="isOpen" (click)="close()"></div>

<aside class="cart-drawer" [class.open]="isOpen">
  
  <div class="cart-header">
    <h2><span class="icon">🛒</span> Carrito</h2>
    <button class="btn-close" (click)="close()">✕</button>
  </div>

  <div class="cart-content">
    <div *ngIf="cart.length === 0" class="empty-cart">
      <p>Tu carrito está vacío</p>
      <button class="btn-back" (click)="close()">Explorar tienda</button>
    </div>

    <div *ngFor="let item of cart" class="cart-item">
      <div class="item-img">
        <img [src]="item.imagen || 'https://via.placeholder.com/80'" [alt]="item.modelo">
      </div>
      
      <div class="item-info">
        <p class="item-name">{{ item.modelo }}</p>
        <p class="item-price">{{ item.precio | currency:'S/. ' }}</p>
        
        <div class="item-actions">
          <input 
            type="number" 
            [(ngModel)]="item.cantidad" 
            (change)="updateCantidad(item)"
            class="qty-input">
          
          <button class="btn-remove" (click)="remove(item.id)">
            Eliminar
          </button>
        </div>
        <p class="subtotal">Subtotal: {{ item.precio * item.cantidad | currency:'S/. ' }}</p>
      </div>
    </div>
  </div>

  <div class="cart-footer" *ngIf="cart.length > 0">
    <div class="total-row">
      <span>Total:</span>
      <span class="total-amount">{{ getTotal() | currency:'S/. ' }}</span>
    </div>
    <button class="btn-checkout" (click)="checkout()">
      💳 Finalizar Compra
    </button>
  </div>
</aside>
