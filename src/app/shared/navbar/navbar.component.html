<nav class="navbar">
  <!-- BARRA PRINCIPAL -->
  <div class="navbar__main">
    <div class="navbar__left-group">
      <button class="navbar__btn-menu" (click)="toggleMenu()" aria-label="Abrir menú">
        <span class="material-symbols-outlined">menu</span>
      </button>

      <a routerLink="/home" class="navbar__logo-container">
        <img src="/Mi-Logo3.svg" alt="Max Cell Logo" class="navbar__logo">
      </a>
    </div>

    <!-- Usuario: Centrado en Desktop -->
    <div class="navbar__user-display desktop-only" *ngIf="isLoggedIn$ | async">
      <span class="user-welcome">Hola, <strong>{{ user$ | async }}</strong></span>
    </div>

    <!-- Acciones Rápidas -->
    <div class="navbar__actions">
      <a routerLink="/login" class="navbar__action-item" *ngIf="!(isLoggedIn$ | async)">
        <span class="material-symbols-outlined">person</span>
      </a>

      <button class="navbar__action-item navbar__action-item--cart" (click)="verCarrito()">
        <span class="material-symbols-outlined">shopping_cart</span>
        <span class="navbar__cart-badge" *ngIf="(cartCount$ | async) as count">
          {{ count > 0 ? count : '' }}
        </span>
      </button>

      <button class="navbar__action-item navbar__action-item--logout desktop-only" 
              *ngIf="isLoggedIn$ | async" (click)="cerraSesion()">
        <span class="material-symbols-outlined">logout</span>
      </button>
    </div>
  </div>

  <!-- BUSCADOR CENTRADO -->
  <div class="navbar__search-wrapper">
    <div class="search-container">
      <input type="text" [(ngModel)]="searchTerm" (input)="buscar()" (keyup.enter)="buscarConBoton()" placeholder="Buscar celulares..." class="search-container__input">
      <button class="search-container__btn" (click)="buscarConBoton()">
        <span class="material-symbols-outlined">search</span>
      </button>
    </div>
  </div>

  <!-- NAVEGACIÓN DESKTOP CON PANEL ADMIN PRO -->
  <div class="navbar__nav-desktop desktop-only">
    <div class="nav-links">
      <a routerLink="/home" routerLinkActive="active">Home</a>
      <a routerLink="/tienda" routerLinkActive="active">Tienda</a>
      <a routerLink="/categorias" routerLinkActive="active">Categorías</a>
      <a *ngIf="isLoggedIn$ | async" routerLink="/ordenes" routerLinkActive="active">Mis Pedidos</a>
    </div>
    
    <!-- Panel Admin Modo Pro -->
    <div class="nav-admin" *ngIf="isAdmin$ | async">
      <a routerLink="/admin" class="nav-admin__link-pro">
        <span class="material-symbols-outlined">admin_panel_settings</span>
        <span>Panel Admin</span>
      </a>
    </div>
  </div>

  <!-- SIDEBAR MÓVIL -->
  <div class="mobile-overlay" [class.active]="isOpen" (click)="closeMenu()">
    <aside class="mobile-sidebar" (click)="$event.stopPropagation()">
      <div class="mobile-sidebar__header">
        <div class="user-profile" *ngIf="isLoggedIn$ | async">
          <span class="material-symbols-outlined">account_circle</span>
          <span><strong>{{ user$ | async }}</strong></span>
        </div>
        <button class="close-btn" (click)="closeMenu()">×</button>
      </div>
      <nav class="mobile-sidebar__nav">
        <a routerLink="/home" (click)="closeMenu()"><span class="material-symbols-outlined">home</span> Home</a>
        <a routerLink="/tienda" (click)="closeMenu()"><span class="material-symbols-outlined">storefront</span> Tienda</a>
        <a routerLink="/categorias" (click)="closeMenu()"><span class="material-symbols-outlined">category</span> Categorías</a>
        <div class="separator"></div>
        <ng-container *ngIf="isLoggedIn$ | async">
          <a routerLink="/ordenes" (click)="closeMenu()"><span class="material-symbols-outlined">package</span> Mis Pedidos</a>
          <a *ngIf="isAdmin$ | async" routerLink="/admin" (click)="closeMenu()" class="admin-link-mobile">
            <span class="material-symbols-outlined">security</span> Panel Admin
          </a>
          <button (click)="cerraSesion(); closeMenu()" class="logout-btn">
            <span class="material-symbols-outlined">logout</span> Cerrar Sesión
          </button>
        </ng-container>
      </nav>
    </aside>
  </div>
</nav>
