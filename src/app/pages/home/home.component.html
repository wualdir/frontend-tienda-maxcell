<h2>🔥 Productos destacados</h2>
<section class="hero-carousel">
  <div class="carousel-container">
    <div class="carousel-slide" 
         *ngFor="let slide of slides; let i = index" 
         [class.active]="i === currentSlide">
      
      <!-- Imagen con máscara de degradado para mejor legibilidad -->
      <div class="image-wrapper">
        <img [src]="slide.image" [alt]="slide.title" class="carousel-image">
        <div class="overlay-gradient"></div>
      </div>

      <div class="carousel-caption">
        <span class="badge">Nuevo</span>
        <h2>{{ slide.title }}</h2>
        <p>{{ slide.subtitle }}</p>
        <button routerLink="/tienda" class="btn-primary">Explorar Ahora</button>
      </div>
    </div>

    <!-- Controles más minimalistas -->
    <button class="control prev" (click)="prevSlide()">
      <span class="material-symbols-outlined">chevron_left</span>
    </button>
    <button class="control next" (click)="nextSlide()">
      <span class="material-symbols-outlined">chevron_right</span>
    </button>
  </div>
</section>

<ng-container *ngIf="(productos$ | async) as productos">
  <app-list-products
    [productos]="productos.slice(0, 3)">
  </app-list-products>
</ng-container>
