<section class="history-container">
  <header class="history-header">
    <h1 class="history-title">📦 Mis Pedidos</h1>
    <p class="history-subtitle">Consulta el estado y detalle de tus compras anteriores.</p>
  </header>

  <div *ngIf="ordenes.length === 0" class="history-empty">
    <div class="history-empty-icon">📂</div>
    <p>Aún no has realizado ninguna compra.</p>
    <a routerLink="/tienda" class="history-btn-shop">Ir a la tienda</a>
  </div>

  <div class="history-list" *ngIf="ordenes.length > 0">
    <article *ngFor="let orden of ordenes" class="history-card">
      <div class="history-card-main">
        <div class="history-info">
          <span class="history-id">Pedido #{{ orden.id }}</span>
          <span class="history-date">{{ orden.createdAt | date:'mediumDate' }}</span>
        </div>
        
        <div class="history-stats">
          <div class="history-total">
            <span class="label">Total</span>
            <span class="value">{{ orden.total | currency:'S/. ' }}</span>
          </div>
          <span class="history-status-badge">Completado</span>
        </div>
      </div>

      <div class="history-actions">
        <button class="history-btn-detail" [routerLink]="['/orden', orden.id]">
          Ver detalles de la orden
        </button>
      </div>
    </article>
  </div>
</section>
